<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<title>Smethwick Map – Crime & Flytipping</title>

<!-- Favicon -->
<link rel="icon" type="image/png" href="resources/SWKONS.png">

<!-- OpenLayers & QGIS2Web styles -->
<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="resources/fontawesome-all.min.css">
<link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
<link rel="stylesheet" href="./resources/ol-layerswitcher.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background-color: #ffffff;
}

/* ===== Layout ===== */
.container {
    display: flex;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
}

/* ===== Map wrapper ===== */
.map-wrapper {
    flex: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
}

/* ===== Title bar with buttons ===== */
.map-title {
    font-size: 18px;
    font-weight: bold;
    padding: 8px 12px;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 1000;
}

.map-title span {
    width: 28px;
    height: 28px;
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #ffffff;
    border: 1px solid #ccc;
    cursor: pointer;
}

/* ===== Map ===== */
#map {
    flex: 1;
    width: 100%;
}

/* ===== Side image ===== */
.side-image {
    flex: 1;
    border: 1px solid #ccc;
    padding: 5px;
    background-color: #f8f8f8;
    overflow-y: auto;
}
.side-image img {
    width: 100%;
    height: auto;
}

/* ===== Popups ===== */
.popup-info {
    position: absolute;
    top: 60px;
    left: 20px;
    width: 420px;
    max-height: 70%;
    overflow-y: auto;
    background: white;
    border: 1px solid #ccc;
    padding: 12px;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    display: none;
    z-index: 2000;
}

.popup-info button {
    margin-top: 10px;
    padding: 6px 10px;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

#crime-popup button { background-color: #dc3545; }
#flytipping-popup button { background-color: #ff8800; color: #fff; }

/* ===== Responsive ===== */
@media (max-width: 800px) {
    .container {
        flex-direction: column;
    }
    .map-wrapper, .side-image {
        height: 50vh;
        width: 100%;
    }
    .popup-info {
        width: 90%;
        left: 5%;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- MAP -->
    <div class="map-wrapper">

        <div class="map-title">
            Smethwick Map
            <span id="crime-button" title="Crime Data">🛡️</span>
            <span id="flytipping-button" title="Flytipping Data">🗑️</span>
        </div>

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>

        <!-- ===== POPUPS ===== -->
        <div id="crime-popup" class="popup-info">
            <h3>🚨 Crime Summary – Dummy Data</h3>
            <ul>
                <li>Total incidents: 42</li>
                <li>Violence: 12</li>
                <li>Theft: 8</li>
                <li>Anti-social behaviour: 15</li>
                <li>Other: 7</li>
            </ul>
            <button>Close</button>
        </div>

        <div id="flytipping-popup" class="popup-info">
            <h3>🗑️ Flytipping Summary – Dummy Data</h3>
            <ul>
                <li>Total incidents: 27</li>
                <li>Reported locations: 15</li>
                <li>Resolved: 10</li>
                <li>Pending: 17</li>
            </ul>
            <button>Close</button>
        </div>

    </div>

    <!-- SIDE PANEL -->
    <div class="side-image">
        <div style="font-weight:bold; text-align:center; margin-bottom:5px;">ONS Profile</div>
        <img src="resources/SWKONS.png" alt="Smethwick overview">
    </div>
</div>

<!-- ===== QGIS2WEB & OpenLayers Scripts ===== -->
<script src="resources/qgis2web_expressions.js"></script>
<script src="./resources/functions.js"></script>
<script src="./resources/ol.js"></script>
<script src="./resources/ol-layerswitcher.js"></script>
<script src="resources/photon-geocoder-autocomplete.min.js"></script>

<!-- ===== Layers (keep as in your repo) ===== -->
<script src="layers/SmethwickCanals_0.js"></script>
<script src="layers/CemeterySmethwick_1.js"></script>
<script src="layers/SmethwickTownBuildings_2.js"></script>
<script src="layers/SmethwickTownCrimeJan25Jan26_3.js"></script>
<script src="layers/SmethwickTownFlyTipping_4.js"></script>
<script src="layers/SmethwickRoads_5.js"></script>
<script src="layers/CommunityFacilityWorks_6.js"></script>
<script src="layers/CemeteryPlannedWorks_7.js"></script>
<script src="layers/SmethwickTown_8.js"></script>

<script src="styles/SmethwickCanals_0_style.js"></script>
<script src="styles/CemeterySmethwick_1_style.js"></script>
<script src="styles/SmethwickTownBuildings_2_style.js"></script>
<script src="styles/SmethwickTownCrimeJan25Jan26_3_style.js"></script>
<script src="styles/SmethwickTownFlyTipping_4_style.js"></script>
<script src="styles/SmethwickRoads_5_style.js"></script>
<script src="styles/CommunityFacilityWorks_6_style.js"></script>
<script src="styles/CemeteryPlannedWorks_7_style.js"></script>
<script src="styles/SmethwickTown_8_style.js"></script>

<script src="./layers/layers.js" type="text/javascript"></script>
<script src="./resources/Autolinker.min.js"></script>
<script src="./resources/qgis2web.js"></script>

<!-- ===== Popup Toggle Logic ===== -->
<script>
function setupPopup(buttonId, popupId) {
    const button = document.getElementById(buttonId);
    const popup = document.getElementById(popupId);
    const closeBtn = popup.querySelector("button");

    button.addEventListener("click", e => {
        e.stopPropagation();
        document.querySelectorAll(".popup-info").forEach(p => p.style.display = "none");
        popup.style.display = "block";
    });

    closeBtn.addEventListener("click", () => popup.style.display = "none");
}

setupPopup("crime-button","crime-popup");
setupPopup("flytipping-button","flytipping-popup");

document.addEventListener("click", e => {
    if (!e.target.closest(".popup-info") && !e.target.closest(".map-title")) {
        document.querySelectorAll(".popup-info").forEach(p => p.style.display = "none");
    }
});
</script>

</body>
</html>
