<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
<title>Smethwick Map – Crime & Flytipping</title>

<link rel="stylesheet" href="./resources/ol.css">
<link rel="stylesheet" href="resources/fontawesome-all.min.css">
<link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
<link rel="stylesheet" href="./resources/ol-layerswitcher.css">
<link rel="stylesheet" href="./resources/qgis2web.css">

<style>
html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, sans-serif;
    background-color: #ffffff;
}

/* ===== Layout ===== */
.container {
    display: flex;
    height: 100vh;
    gap: 10px;
    padding: 10px;
    box-sizing: border-box;
}

/* ===== Map wrapper ===== */
.map-wrapper {
    flex: 2;
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative; /* needed for popup positioning */
}

/* ===== Title bar with buttons ===== */
.map-title {
    font-size: 18px;
    font-weight: bold;
    padding: 8px 12px;
    background-color: #f0f0f0;
    border: 1px solid #ccc;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 1000;
    position: relative;
}

.map-title span {
    width: 28px;
    height: 28px;
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #ffffff;
    border: 1px solid #ccc;
    cursor: pointer;
    position: relative; /* popup will be positioned absolutely relative to this */
}

/* ===== Map ===== */
#map {
    flex: 1;
    width: 100%;
    min-height: 400px; /* ensures map is visible */
}

/* ===== Side image ===== */
.side-image {
    flex: 1.2;
    max-width: 400px;
    border: 1px solid #ccc;
    padding: 10px;
    background-color: #f8f8f8;
    overflow-y: auto;
}
.side-image img {
    width: 100%;
    height: auto;
    display: block;
}

/* ===== Popups ===== */
.popup-info {
    position: absolute;
    top: calc(100% + 5px); /* directly below the button */
    left: 0;
    width: 400px;
    max-height: 400px;
    overflow-y: auto;
    background: white;
    border: 1px solid #ccc;
    padding: 12px;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    display: none;
    z-index: 2000;
}

.popup-info button {
    margin-top: 10px;
    padding: 6px 10px;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}

#crime-popup button { background-color: #dc3545; }
#flytipping-popup button { background-color: #ff8800; color: #fff; }

/* ===== Responsive ===== */
@media (max-width: 1000px) {
    .container {
        flex-direction: column;
    }
    .map-wrapper, .side-image {
        height: 50vh;
        width: 100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- MAP -->
    <div class="map-wrapper">

        <div class="map-title">
            Smethwick Map
            <span id="crime-button" title="Crime Data">🛡️</span>
            <span id="flytipping-button" title="Flytipping Data">🗑️</span>
        </div>

        <div id="map"></div>

        <!-- POPUPS -->
        <div id="crime-popup" class="popup-info">
            <h3>Crime Summary for Smethwick (2025–Jan 2026)</h3>
            <p>Analysis of recorded incidents across Smethwick shows that crime levels remain consistently high...</p>
            <button>Close</button>
        </div>

        <div id="flytipping-popup" class="popup-info">
            <h3>Executive Summary – Smethwick (2025–2026)</h3>
            <p>Smethwick is one of the highest volume fly tipping zones in the dataset...</p>
            <button>Close</button>
        </div>

    </div>

    <!-- SIDE PANEL -->
    <div class="side-image">
        <div style="font-weight:bold; text-align:center; margin-bottom:5px;">ONS Profile</div>
        <img src="resources/SWKONS.png" alt="Smethwick overview">
    </div>

</div>

<script src="resources/ol.js"></script>

<script>
// Map init (update layers as needed)
var map = new ol.Map({
    target: 'map',
    layers: [],
    view: new ol.View({
        center: ol.proj.fromLonLat([-1.998, 52.5]), // Smethwick coords
        zoom: 14
    })
});

// Function to toggle popup below button
function setupPopup(buttonId, popupId) {
    const button = document.getElementById(buttonId);
    const popup = document.getElementById(popupId);
    const closeBtn = popup.querySelector("button");

    button.addEventListener("click", e => {
        e.stopPropagation();
        const rect = button.getBoundingClientRect();
        const containerRect = button.closest('.map-wrapper').getBoundingClientRect();

        popup.style.top = (rect.bottom - containerRect.top + 5) + "px";
        popup.style.left = (rect.left - containerRect.left) + "px";

        // hide other popups
        document.querySelectorAll(".popup-info").forEach(p => {
            if(p !== popup) p.style.display = "none";
        });

        popup.style.display = (popup.style.display === "block") ? "none" : "block";
    });

    closeBtn.addEventListener("click", () => popup.style.display = "none");
}

// Setup both popups
setupPopup("crime-button","crime-popup");
setupPopup("flytipping-button","flytipping-popup");

// Click outside to close
document.addEventListener("click", e => {
    if(!e.target.closest(".map-title span") && !e.target.closest(".popup-info")) {
        document.querySelectorAll(".popup-info").forEach(p => p.style.display = "none");
    }
});
</script>

</body>
</html>
